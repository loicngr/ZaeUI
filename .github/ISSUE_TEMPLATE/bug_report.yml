name: Bug Report
description: Report a bug or unexpected behavior in a ZaeUI addon
labels: ["bug"]
body:
  - type: dropdown
    id: addon
    attributes:
      label: Addon
      description: Which addon is affected?
      options:
        - ZaeUI_ActionBars
        - ZaeUI_FriendlyPlates
        - ZaeUI_Interrupts
        - ZaeUI_Nameplates
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      placeholder: |
        1. Enable addon '...'
        2. Go to '...'
        3. Do '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Message / Lua Error
      description: Paste any error message or Lua traceback here.
      render: text

  - type: input
    id: wow-version
    attributes:
      label: WoW Version
      description: Which version of WoW are you running?
      placeholder: e.g. 12.0.2
    validations:
      required: true

  - type: input
    id: addon-version
    attributes:
      label: Addon Version
      description: Version of the ZaeUI addon (see .toc or CurseForge).
      placeholder: e.g. 1.2.0

  - type: textarea
    id: other-addons
    attributes:
      label: Other Addons
      description: List any other addons that might be relevant (ElvUI, Plater, WeakAuras, etc.).
      placeholder: e.g. Plater 4.x, WeakAuras 5.x
