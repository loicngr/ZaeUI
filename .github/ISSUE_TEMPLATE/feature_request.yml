name: Feature Request
description: Suggest a new feature or improvement for a ZaeUI addon
labels: ["enhancement"]
body:
  - type: dropdown
    id: addon
    attributes:
      label: Addon
      description: Which addon does this feature concern?
      options:
        - ZaeUI_ActionBars
        - ZaeUI_Defensives
        - ZaeUI_FriendlyPlates
        - ZaeUI_Interrupts
        - ZaeUI_Nameplates
        - New addon idea
        - Multiple / General
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve or what need does it address?
      placeholder: I'm frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references.
