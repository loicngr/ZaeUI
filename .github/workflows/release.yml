name: Release

on:
  push:
    branches: [main]
    paths:
      - 'ZaeUI_*/**'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            PATCH=$(echo "$LATEST_TAG" | sed 's/v[0-9]*\.[0-9]*\.//')
            PREFIX=$(echo "$LATEST_TAG" | sed 's/\.[0-9]*$//')
            NEXT_TAG="${PREFIX}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "body<<CHANGELOG_END"
            echo "## Changes"
            echo ""
            git log --oneline "$RANGE" | while IFS= read -r line; do
              SHA=$(echo "$line" | cut -d' ' -f1)
              MSG=$(echo "$line" | cut -d' ' -f2-)
              if echo "$MSG" | grep -qE 'Merge pull request #[0-9]+'; then
                PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+')
                echo "- ${MSG} ([${PR_NUM}](https://github.com/${REPO}/pull/${PR_NUM#\#}))"
              else
                echo "- ${MSG} ([\`${SHA}\`](https://github.com/${REPO}/commit/${SHA}))"
              fi
            done
            echo ""
            echo "CHANGELOG_END"
          } >> "$GITHUB_OUTPUT"

      - name: Zip addons
        run: |
          shopt -s nullglob
          for dir in ZaeUI_*/; do
            name="${dir%/}"
            zip -r "${name}.zip" "$dir"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$RELEASE_BODY" \
            ZaeUI_*.zip
