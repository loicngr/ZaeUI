name: Release

on:
  push:
    branches: [main]
    paths:
      - 'ZaeUI_*/**'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_TAG="v1.0.0"
          else
            PATCH=$(echo "$LATEST_TAG" | sed 's/v[0-9]*\.[0-9]*\.//')
            PREFIX=$(echo "$LATEST_TAG" | sed 's/\.[0-9]*$//')
            NEXT_TAG="${PREFIX}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        env:
          PREV_TAG: ${{ steps.version.outputs.prev_tag }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          {
            echo "body<<CHANGELOG_END"
            echo "## Addons"
            echo ""
            shopt -s nullglob
            for dir in ZaeUI_*/; do
              name="${dir%/}"
              toc_file="${dir}${name}.toc"
              if [ -f "$toc_file" ]; then
                version=$(grep -oP '## Version:\s*\K.*' "$toc_file")
                echo "- **${name}**: v${version}"
              fi
            done
            echo ""
            echo "## Changes"
            echo ""
            git log --oneline "$RANGE" | while IFS= read -r line; do
              SHA=$(echo "$line" | cut -d' ' -f1)
              MSG=$(echo "$line" | cut -d' ' -f2-)
              if echo "$MSG" | grep -qE 'Merge pull request #[0-9]+'; then
                PR_NUM=$(echo "$MSG" | grep -oE '#[0-9]+')
                echo "- ${MSG} ([${PR_NUM}](https://github.com/${REPO}/pull/${PR_NUM#\#}))"
              else
                echo "- ${MSG} ([\`${SHA}\`](https://github.com/${REPO}/commit/${SHA}))"
              fi
            done
            echo ""
            echo "CHANGELOG_END"
          } >> "$GITHUB_OUTPUT"

      - name: Zip addons
        run: |
          shopt -s nullglob
          for dir in ZaeUI_*/; do
            name="${dir%/}"
            zip -r "${name}.zip" "$dir"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$RELEASE_BODY" \
            ZaeUI_*.zip

      - name: Get CurseForge game version ID
        id: cf_version
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION_ID=$(curl -s -f -H "X-Api-Token: $CF_TOKEN" \
            "https://wow.curseforge.com/api/game/versions" \
            | jq '[.[] | select(.name | test("^12\\.")) | .id] | max')
          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "::error::Failed to resolve CurseForge game version ID for Midnight (12.x)"
            exit 1
          fi
          echo "id=$VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        env:
          CF_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CF_VERSION_ID: ${{ steps.cf_version.outputs.id }}
          TAG: ${{ steps.version.outputs.tag }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          shopt -s nullglob
          FAILED=0
          for zip in ZaeUI_*.zip; do
            ADDON_NAME="${zip%.zip}"
            PROJECT_ID=$(jq -r --arg name "$ADDON_NAME" '.[$name] // empty' .curseforge.json)
            if [ -z "$PROJECT_ID" ]; then
              echo "::warning::No CurseForge project ID for $ADDON_NAME, skipping"
              continue
            fi
            METADATA=$(jq -n \
              --arg changelog "$RELEASE_BODY" \
              --arg version "$TAG" \
              --argjson gameVersions "[$CF_VERSION_ID]" \
              '{changelog: $changelog, changelogType: "markdown", displayName: $version, gameVersions: $gameVersions, releaseType: "release"}')
            echo "Uploading $zip to CurseForge project $PROJECT_ID..."
            if curl -s -f \
              -H "X-Api-Token: $CF_TOKEN" \
              -F "metadata=$METADATA" \
              -F "file=@$zip" \
              "https://wow.curseforge.com/api/projects/${PROJECT_ID}/upload-file"; then
              echo "Uploaded $zip successfully"
            else
              echo "::error::Failed to upload $zip to CurseForge project $PROJECT_ID"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then exit 1; fi
