name: Issue Auto-Labeler

on:
  issues:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Apply addon label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const addonMap = {
              'ZaeUI_ActionBars': 'ActionBars',
              'ZaeUI_Defensives': 'Defensives',
              'ZaeUI_DungeonNotes': 'DungeonNotes',
              'ZaeUI_FriendlyPlates': 'FriendlyPlates',
              'ZaeUI_Interrupts': 'Interrupts',
              'ZaeUI_Nameplates': 'Nameplates',
              'ZaeUI_Shared': 'Shared',
            };

            const labels = [];
            for (const [key, label] of Object.entries(addonMap)) {
              if (body.includes(key)) {
                labels.push(label);
              }
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }
